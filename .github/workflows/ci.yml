name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format-check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  chromium-smoke:
    name: chromium smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @speech/web exec playwright install --with-deps chromium
      - run: pnpm chromium-smoke
